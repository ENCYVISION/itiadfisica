<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física y Simulación | Portafolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Un toque de estilo personalizado para mejorar el tema oscuro */
    body {
      background-color: #121212;
      color: #e0e0e0;
    }
    .card {
      background-color: #1e1e1e;
      border: 1px solid #333;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      border-color: #0d6efd; /* Brillo azul sutil al pasar el cursor */
    }
    .ratio-16x9 {
      background-color: #2a2a2a; /* Fondo para los videos mientras cargan */
    }
  </style>
</head>
<body>

  <header class="py-5 text-center bg-dark border-bottom border-secondary mb-5">
    <div class="container">
      <h1 class="fw-bold display-4 text-white">Portafolio de Física y Simulación</h1>
      <p class="lead text-muted">Colección de prácticas, dinámicas y simulaciones 3D.</p>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      
      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title text-primary">Caída Libre</h5>
            <p class="card-text text-muted">Próximamente</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title text-primary">Plano Inclinado</h5>
            <p class="card-text text-muted">Próximamente</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title text-primary">Práctica Boliche</h5>
            <p class="card-text text-muted">Próximamente</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title text-primary">Constraints (Puerta)</h5>
            <p class="card-text text-muted">Próximamente</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title text
